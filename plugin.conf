# Plugin configuration loaded by the execd shim (via -config).
# This file is read by the standalone plugin binary, NOT by Telegraf directly.
[[inputs.axis_airquality]]
  url = "http://10.0.0.10"
  username = "root"
  password = "secret"
  # mode = "stream"   # or "history" for polled ~60s REST data
  # sensor_id = ""
  # serial = ""        # auto-fetched from the device when empty
  # HEAT_INDEX and HUMIDEX are derived comfort indices not all devices emit;
  # they are excluded from the default and must be added explicitly.
  # categories = ["TEMPERATURE", "HUMIDITY", "CO2", "NOX", "PM1_0", "PM2_5", "PM4_0", "PM10_0", "VOC", "AQI"]
  # lookback = "5m"
  # timeout = "10s"
  # insecure_skip_verify = false
